{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ block "title" . }}LinkLog{{ end }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="alternate" type="application/rss+xml" title="LinkLog RSS" href="/feed.xml">
    <link rel="alternate" type="application/feed+json" title="LinkLog JSON Feed" href="/feed.json">
</head>
<body>
    <header>
        <a href="/" class="site-title">LinkLog</a>

            <a href="https://joshuapsteele.com">joshuapsteele.com</a>
            <a href="/feed.xml">RSS</a>
        </nav>
    </header>
    <main>
        {{ block "content" . }}{{ end }}
    </main>
    <footer>
        <p>
            <a href="/admin">Admin</a> ·
            <a href="/feed.xml">RSS</a> ·
            <a href="/feed.json">JSON Feed</a> ·
            <a href="https://joshuapsteele.com">joshuapsteele.com</a> ·
            <a href="https://social.joshuapsteele.com">Micro.Blog</a>
