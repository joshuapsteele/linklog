{{ define "title" }}New Link — LinkLog Admin{{ end }}

{{ define "content" }}
<div class="admin-form-wrap">
    <h1>New Link</h1>
    {{ if .Error }}<p class="form-error">{{ .Error }}</p>{{ end }}

    <form method="POST" action="/admin/links/new" class="admin-form">

        <label for="url">URL <span class="label-hint">(required)</span></label>
        <input type="url" id="url" name="url" value="{{ index .Form "url" }}" required autofocus placeholder="https://example.com/article">

        <label for="title">Title <span class="label-hint">(leave blank to fetch from URL)</span></label>
        <input type="text" id="title" name="title" value="{{ index .Form "title" }}" placeholder="Auto-fetched if blank">

        <label for="commentary">Commentary</label>
        <textarea id="commentary" name="commentary" rows="4" placeholder="Why is this worth reading?">{{ index .Form "commentary" }}</textarea>

        <label for="tags">Tags <span class="label-hint">(comma-separated)</span></label>
        <input type="text" id="tags" name="tags" value="{{ index .Form "tags" }}" placeholder="go,indieweb,tools">

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save link</button>
            <a href="/admin" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{{ end }}
