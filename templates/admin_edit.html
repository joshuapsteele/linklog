{{ define "title" }}Edit Link — LinkLog Admin{{ end }}

{{ define "content" }}
<div class="admin-form-wrap">
    <h1>Edit Link</h1>
    {{ if .Error }}<p class="form-error">{{ .Error }}</p>{{ end }}

    <form method="POST" action="/admin/links/{{ .Link.ID }}/edit" class="admin-form">

        <label for="url">URL</label>
        <input type="url" id="url" name="url" value="{{ .Link.URL }}" required>

        <label for="title">Title <span class="label-hint">(auto-fetched from URL)</span></label>
        <input type="text" id="title" name="title" value="{{ .Link.Title }}">

        <label for="commentary">Commentary</label>
        <textarea id="commentary" name="commentary" rows="4">{{ .Link.Commentary }}</textarea>

        <label for="tags">Tags <span class="label-hint">(comma-separated)</span></label>
        <input type="text" id="tags" name="tags" value="{{ .Link.Tags }}" placeholder="go,indieweb,tools">

        <label class="checkbox-label">
            <input type="checkbox" name="published" {{ if .Link.Published }}checked{{ end }}>
            Published
        </label>

        <div class="webmention-status-row">
            <span class="label-hint">Webmention:
                <span class="wm-status wm-{{ .Link.WebmentionStatus }}">{{ .Link.WebmentionStatus }}</span>
                {{ if .Link.WebmentionEndpoint }}
                <span class="label-hint">({{ .Link.WebmentionEndpoint }})</span>
                {{ end }}
            </span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save changes</button>
            <a href="/admin" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{{ end }}
